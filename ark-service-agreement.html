<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ARK Service Agreement Generator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; font-size: 14px; color: #222; background: #f5f5f5; }
  .app { max-width: 780px; margin: 0 auto; padding: 24px 20px 60px; }
  .app-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 3px solid #C2185B; }
  .app-header img { height: 52px; }
  .app-header-text h1 { font-size: 18px; font-weight: 700; color: #C2185B; }
  .app-header-text p { font-size: 13px; color: #666; margin-top: 2px; }
  .card { background: #fff; border-radius: 8px; border: 1px solid #e0e0e0; padding: 20px 24px; margin-bottom: 16px; }
  .section-label { font-size: 11px; font-weight: 700; color: #C2185B; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 14px; }
  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field-grid.cols-1 { grid-template-columns: 1fr; }
  .field-full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  label { font-size: 12px; color: #555; font-weight: 600; }
  input[type=text], input[type=date], input[type=email], input[type=tel], select {
    height: 36px; padding: 0 10px; border: 1px solid #ccc; border-radius: 5px;
    font-size: 13px; font-family: Arial, sans-serif; color: #222; background: #fff;
    width: 100%;
  }
  input:focus, select:focus { outline: none; border-color: #C2185B; box-shadow: 0 0 0 2px rgba(194,24,91,0.12); }
  .check-list { display: flex; flex-direction: column; gap: 8px; }
  .check-item { display: flex; align-items: flex-start; gap: 10px; padding: 8px 10px; border: 1px solid #e8e8e8; border-radius: 5px; cursor: pointer; transition: background 0.1s; }
  .check-item:hover { background: #fef0f4; }
  .check-item input[type=checkbox] { margin-top: 2px; accent-color: #C2185B; width: 15px; height: 15px; flex-shrink: 0; }
  .check-item-text { font-size: 12px; line-height: 1.4; }
  .check-item-code { font-weight: 700; color: #C2185B; display: block; }
  .check-item-name { color: #444; }
  .rep-toggle-btn { background: none; border: none; color: #C2185B; font-size: 13px; font-weight: 600; cursor: pointer; padding: 4px 0; text-decoration: underline; font-family: Arial, sans-serif; }
  .btn-generate { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; height: 46px; background: #C2185B; color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: Arial, sans-serif; margin-top: 4px; }
  .btn-generate:hover { background: #A3154E; }
  .preview-card { background: #fff; border-radius: 8px; border: 1px solid #e0e0e0; overflow: hidden; margin-top: 20px; display: none; }
  .preview-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #f9f9f9; border-bottom: 1px solid #e0e0e0; }
  .preview-toolbar span { font-size: 13px; font-weight: 600; color: #333; }
  .btn-print { display: flex; align-items: center; gap: 6px; padding: 0 14px; height: 34px; background: #fff; border: 1px solid #ccc; border-radius: 5px; font-size: 13px; cursor: pointer; font-family: Arial, sans-serif; }
  .btn-print:hover { background: #f5f5f5; }
  iframe { width: 100%; border: none; display: block; }
  @media (max-width: 520px) { .field-grid { grid-template-columns: 1fr; } }
</style>
</head>

let repOpen = false;

function toggleRep() {
  repOpen = !repOpen;
  document.getElementById('rep-fields').style.display = repOpen ? 'block' : 'none';
  document.getElementById('rep-toggle').textContent = repOpen ? '- Remove participant representative' : '+ Add participant representative';
}

function fmtDate(v) {
  if (!v) return '';
  const d = new Date(v + 'T00:00:00');
  return d.toLocaleDateString('en-AU', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function generate() {
  const loc = document.getElementById('p-location').value;
  const locIdx = loc === 'National' ? 2 : loc === 'Remote' ? 3 : 4;

  const f = id => esc(document.getElementById(id).value);
  const fd = id => esc(fmtDate(document.getElementById(id).value));

  const items = [...document.querySelectorAll('.line-item:checked')].map(cb => {
    const p = cb.value.split('|');
    return { code: p[0], name: p[1], rate: '$' + p[locIdx] };
  });

  const lineRows = items.length ? items.map(i =>
    '<tr><td style="padding:5px 8px;border:1px solid #ccc;font-size:11px;">' + esc(i.code) + '</td>' +
    '<td style="padding:5px 8px;border:1px solid #ccc;font-size:11px;">' + esc(i.name) + '</td>' +
    '<td style="padding:5px 8px;border:1px solid #ccc;font-size:11px;text-align:center;">Hour</td>' +
    '<td style="padding:5px 8px;border:1px solid #ccc;font-size:11px;text-align:center;">' + esc(i.rate) + '</td>' +
    '<td style="padding:5px 8px;border:1px solid #ccc;font-size:11px;text-align:center;">&#10003;</td></tr>'

/* ================= ARK shared .docx engine (generic HTML -> WordprocessingML) =================
   Dependency-free. Converts an HTML string or DOM node into a valid .docx.
   Handles: h1-h3, p/div, table (colspan + shading), ul/ol, br, b/strong, i/em, checkboxes.

var ARK_CRC_T=(function(){var t=[],c;for(var n=0;n<256;n++){c=n;for(var k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();

function arkEnc(s){if(typeof TextEncoder!=='undefined')return new TextEncoder().encode(s);var b=[];for(var i=0;i<s.length;i++){var cp=s.codePointAt(i);if(cp>0xFFFF)i++;if(cp<0x80)b.push(cp);else if(cp<0x800){b.push(0xC0|cp>>6,0x80|cp&63);}else if(cp<0x10000){b.push(0xE0|cp>>12,0x80|cp>>6&63,0x80|cp&63);}else{b.push(0xF0|cp>>18,0x80|cp>>12&63,0x80|cp>>6&63,0x80|cp&63);}}return new Uint8Array(b);}

    var nameB=arkEnc(e.name),data=e.data,crc=arkCrc32(data);
    [u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0x21),u32(crc),u32(data.length),u32(data.length),u16(nameB.length),u16(0)].forEach(function(x){parts.push(x);});
    parts.push(nameB);parts.push(data);
    [u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0x21),u32(crc),u32(data.length),u32(data.length),u16(nameB.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset)].forEach(function(x){central.push(x);});
    central.push(nameB);
    offset+=30+nameB.length+data.length;
  });

  var eocd=[u32(0x06054b50),u16(0),u16(0),u16(entries.length),u16(entries.length),u32(cdSize),u32(offset),u16(0)];

  all.forEach(function(x){total+=x.length;});

function arkX(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ---- style helpers ---- */
function arkHex(v){
  if(!v)return null;
  v=String(v).trim();
  var m=v.match(/^#([0-9a-f]{6})$/i);if(m)return m[1].toUpperCase();
  m=v.match(/^#([0-9a-f]{3})$/i);if(m)return (m[1][0]+m[1][0]+m[1][1]+m[1][1]+m[1][2]+m[1][2]).toUpperCase();

function arkStyleOf(el){

    if(bg)s.fill=arkHex(bg[1]);
    var col=st.match(/(?:^|;)\s*color\s*:\s*([^;]+)/i);

/* ---- inline runs ---- */
function arkRuns(node,inh){
  inh=inh||{};
  var out='';
  var kids=node.childNodes||[];
  for(var i=0;i<kids.length;i++){
    var n=kids[i];
    if(n.nodeType===3){
      var t=n.nodeValue.replace(/\s+/g,' ');
      if(!t||!t.trim()){ if(t===' '&&out)out+=''; continue; }
      out+=arkRun(t,inh);
    }else if(n.nodeType===1){
      var tag=n.tagName.toLowerCase();
      if(tag==='br'){out+='<w:r><w:br/></w:r>';continue;}
      if(tag==='script'||tag==='style'||tag==='button')continue;
      if(tag==='input'){
        var ity=(n.getAttribute('type')||'text').toLowerCase();
        if(ity==='checkbox')out+=arkRun(n.checked?'\u2612 ':'\u2610 ',inh);
        else if(ity!=='hidden')out+=arkRun(n.value||'',inh);
        continue;
      }
      if(tag==='select'){out+=arkRun(n.value||'',inh);continue;}
      if(tag==='textarea'){out+=arkRun(n.value||'',inh);continue;}
      var st=arkStyleOf(n),o={};
      for(var k in inh)o[k]=inh[k];
      if(tag==='b'||tag==='strong')o.bold=true;
      if(tag==='i'||tag==='em')o.italic=true;
      if(st.bold)o.bold=true;
      if(st.color)o.color=st.color;
      if(st.sz)o.sz=st.sz;
      out+=arkRuns(n,o);
    }
  }
  return out;
}
function arkRun(text,o){
  o=o||{};
  var pr='';
  if(o.bold)pr+='<w:b/>';
  if(o.italic)pr+='<w:i/>';
  if(o.color)pr+='<w:color w:val="'+o.color+'"/>';
  if(o.sz)pr+='<w:sz w:val="'+o.sz+'"/><w:szCs w:val="'+o.sz+'"/>';
  var lines=String(text==null?'':text).split('\n'),xml='';
  for(var i=0;i<lines.length;i++){
    if(i>0)xml+='<w:br/>';
    xml+='<w:t xml:space="preserve">'+arkX(lines[i])+'</w:t>';
  }
  return '<w:r>'+(pr?'<w:rPr>'+pr+'</w:rPr>':'')+xml+'</w:r>';
}
function arkPara(runs,o){
  o=o||{};
  var pr='';
  if(o.before||o.after!==undefined)pr+='<w:spacing'+(o.before?' w:before="'+o.before+'"':'')+' w:after="'+(o.after===undefined?60:o.after)+'"/>';
  if(o.border)pr+='<w:pBdr><w:bottom w:val="single" w:sz="6" w:space="1" w:color="'+o.border+'"/></w:pBdr>';
  if(o.ind)pr+='<w:ind w:left="'+o.ind+'"/>';
  if(!runs)runs='<w:r><w:t xml:space="preserve"></w:t></w:r>';
  return '<w:p>'+(pr?'<w:pPr>'+pr+'</w:pPr>':'')+runs+'</w:p>';
}

/* ---- table ---- */
function arkTable(tbl,ctx){
  var rows=[],maxCols=0;
  var trs=tbl.querySelectorAll?tbl.querySelectorAll('tr'):[];
  for(var r=0;r<trs.length;r++){
    var tr=trs[r],cells=[],tds=tr.children||[],rowCols=0;
    for(var c=0;c<tds.length;c++){
      var td=tds[c];
      var tag=td.tagName?td.tagName.toLowerCase():'';
      if(tag!=='td'&&tag!=='th')continue;
      var st=arkStyleOf(td);
      var trSt=arkStyleOf(tr);
      var fill=st.fill||trSt.fill||(tag==='th'?'EFE9F4':null);
      var inh={};
      if(st.color||trSt.color)inh.color=st.color||trSt.color;
      if(st.bold||tag==='th')inh.bold=true;
      inh.sz=st.sz||20;
      var inner=arkBlocks(td,ctx,inh);
      if(!inner)inner=arkPara(arkRun('',inh),{after:20});
      var span=parseInt(td.getAttribute('colspan')||'1',10);
      rowCols+=span;
      var pr='<w:tcPr>';
      if(span>1)pr+='<w:gridSpan w:val="'+span+'"/>';
      if(fill)pr+='<w:shd w:val="clear" w:color="auto" w:fill="'+fill+'"/>';
      pr+='<w:vAlign w:val="top"/></w:tcPr>';
      cells.push('<w:tc>'+pr+inner+'</w:tc>');
    }
    if(cells.length){if(rowCols>maxCols)maxCols=rowCols;rows.push('<w:tr>'+cells.join('')+'</w:tr>');}
  }
  if(!rows.length)return '';
  var b='<w:tblBorders><w:top w:val="single" w:sz="4" w:color="BBBBBB"/><w:left w:val="single" w:sz="4" w:color="BBBBBB"/><w:bottom w:val="single" w:sz="4" w:color="BBBBBB"/><w:right w:val="single" w:sz="4" w:color="BBBBBB"/><w:insideH w:val="single" w:sz="4" w:color="BBBBBB"/><w:insideV w:val="single" w:sz="4" w:color="BBBBBB"/></w:tblBorders>';
  var grid='<w:tblGrid>';
  var colW=Math.floor(9638/(maxCols||1));
  for(var g=0;g<(maxCols||1);g++)grid+='<w:gridCol w:w="'+colW+'"/>';
  grid+='</w:tblGrid>';
  return '<w:tbl><w:tblPr><w:tblW w:w="5000" w:type="pct"/>'+b+'</w:tblPr>'+grid+rows.join('')+'</w:tbl>'+arkPara('',{after:80});
}

/* ---- block walker ---- */
var ARK_HEAD={h1:{sz:34,after:120},h2:{sz:26,before:220,after:80},h3:{sz:23,before:160,after:60},h4:{sz:22,before:120,after:60}};
function arkBlocks(node,ctx,inh){

    if(n.nodeType!==1)continue;

    var cls=(n.className&&typeof n.className==='string')?n.className:'';
    if(/\bno-print\b|\browbtns\b/.test(cls))continue;
    if(ARK_HEAD[tag]){

    }

      var lis=n.children||[];
      for(var j=0;j<lis.length;j++){

    }
    if(tag==='br'){pending+='<w:r><w:br/></w:r>';continue;}
    if(tag==='input'){
      var ty=(n.getAttribute('type')||'text').toLowerCase();
      if(ty==='checkbox')pending+=arkRun(n.checked?'\u2612 ':'\u2610 ',inh);
      else pending+=arkRun(n.value||'',inh);

    }
    if(tag==='textarea'){flush();var tv=n.value||'';if(tv.trim())out+=arkPara(arkRun(tv,inh),{after:60});continue;}
    if(tag==='select'){pending+=arkRun(n.value||'',inh);continue;}
    // block-level containers
    var isBlock=(tag==='div'||tag==='p'||tag==='section'||tag==='header'||tag==='footer'||tag==='article'||tag==='li');
    if(isBlock){
      var hasBlockKids=false,ck=n.children||[];
      for(var q=0;q<ck.length;q++){
        var ctag=ck[q].tagName.toLowerCase();
        if(ctag==='div'||ctag==='p'||ctag==='table'||ctag==='ul'||ctag==='ol'||ARK_HEAD[ctag]||ctag==='textarea'){hasBlockKids=true;break;}
      }
      flush();
      var nst=arkStyleOf(n),ninh={};
      for(var kk in inh)ninh[kk]=inh[kk];
      if(nst.bold)ninh.bold=true;
      if(nst.color)ninh.color=nst.color;
      if(nst.sz)ninh.sz=nst.sz;
      if(hasBlockKids){out+=arkBlocks(n,ctx,ninh);}
      else{
        var runs=arkRuns(n,ninh);
        if(runs)out+=arkPara(runs,{after:60});
      }
      continue;
    }
    // inline fallback
    pending+=arkRuns(n,inh);
  }
  flush();
  return out;
}

/* ---- package ---- */
function arkBuildDocx(bodyXml){
  var docXml='<?xml version="1.0" encoding="UTF-8" standalone="yes"?>'
    +'<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>'
    +bodyXml
    +'<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1134" w:right="1134" w:bottom="1134" w:left="1134"/></w:sectPr>'
    +'</w:body></w:document>';
  var ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'
    +'<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/>'
    +'<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>'
    +'<Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/></Types>';
  var rels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
    +'<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>';
  var drels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'
    +'<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/></Relationships>';
  var styles='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">'
    +'<w:docDefaults><w:rPrDefault><w:rPr><w:rFonts w:ascii="Arial" w:hAnsi="Arial"/><w:sz w:val="20"/><w:szCs w:val="20"/></w:rPr></w:rPrDefault>'
    +'<w:pPrDefault><w:pPr><w:spacing w:after="60" w:line="264" w:lineRule="auto"/></w:pPr></w:pPrDefault></w:docDefaults></w:styles>';
  return arkZip([
    {name:'[Content_Types].xml',data:arkEnc(ct)},
    {name:'_rels/.rels',data:arkEnc(rels)},
    {name:'word/_rels/document.xml.rels',data:arkEnc(drels)},
    {name:'word/document.xml',data:arkEnc(docXml)},
    {name:'word/styles.xml',data:arkEnc(styles)}
  ]);
}
/* Convert an HTML string OR a DOM node into .docx bytes. */
function arkHtmlToDocx(source,opts){
  opts=opts||{};
  var root;
  if(typeof source==='string'){
    var doc=new DOMParser().parseFromString(source,'text/html');
    root=doc.body;
  }else{root=source;}
  var body=arkBlocks(root,{accent:opts.accent||null},{});
  return arkBuildDocx(body);
}
function arkDownloadDocx(bytes,filename){
  var blob=new Blob([bytes],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  document.body.appendChild(a);a.click();
  setTimeout(function(){URL.revokeObjectURL(a.href);a.remove();},2000);
}
function arkSafeName(s){return String(s||'participant').replace(/[^a-z0-9]+/gi,'-').replace(/^-+|-+$/g,'')||'participant';}
function arkToday(){return new Date().toISOString().slice(0,10);}

function exportDocx(){
  if(!window.__arkLastHtml){ generate(); }
  if(!window.__arkLastHtml){ alert('Generate the agreement first.'); return; }
  var name = document.getElementById('p-name') ? document.getElementById('p-name').value : '';
  arkDownloadDocx(arkHtmlToDocx(window.__arkLastHtml,{accent:'C2185B'}),
    'ARK-Service-Agreement-'+arkSafeName(name)+'-'+arkToday()+'.docx');
}
